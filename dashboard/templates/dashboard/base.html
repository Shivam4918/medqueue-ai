<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}MedQueue{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: ui-sans-serif, system-ui;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- NAVBAR -->
    <header class="bg-white border-b">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

            <!-- Logo -->
            <div class="flex items-center gap-2">
                <span class="text-2xl">🏥</span>
                <span class="text-xl font-semibold text-blue-600">
                    MedQueue AI
                </span>
            </div>

            {% if request.user.is_authenticated %}
            <div class="flex items-center gap-6">

                <!-- Role Badge -->
                <span class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">
                    {{ request.user.role|title }}
                </span>

                <!-- Username -->
                <span class="text-gray-600 text-sm">
                    Welcome, <strong>{{ request.user.username }}</strong>
                </span>

                <!-- Logout -->
                <form method="post" action="/logout/">
                    {% csrf_token %}
                    <button class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm transition">
                        Logout
                    </button>
                </form>
            </div>
            {% endif %}

        </div>
    </header>

    <!-- CONTENT -->
    <main class="flex-1 max-w-6xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

</body>

</html>
