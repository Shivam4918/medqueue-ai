{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Create New Password | MedQueue AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
            background: #F9FAFB;
            font-size: 14px;
            transition: 0.25s;
        }

        .input:focus {
            outline: none;
            border-color: #0F766E;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        .strength-bar {
            height: 5px;
            border-radius: 999px;
            transition: 0.3s;
        }
    </style>
</head>

<body class="h-screen bg-[#F9FAFB] flex items-center justify-center">

    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

        <h2 class="text-2xl font-bold text-[#1E3A8A] text-center mb-6">
            Set New Password
        </h2>

        {% if messages %}
        {% for message in messages %}
        <div class="bg-red-100 text-red-700 text-sm p-3 rounded-lg mb-4">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        <div class="text-center text-sm text-gray-600 mb-4">
            ⏳ Link expires in:
            <span id="timer" class="font-semibold text-red-600"></span>
        </div>
        <form method="POST" id="resetForm" autocomplete="off">
            {% csrf_token %}

            <!-- Password -->
            <div class="relative mb-3">
                <input type="password" name="password1" id="password" class="input pr-14" placeholder="New password"
                    autocomplete="new-password" required>

                <button type="button"
                    class="absolute right-4 top-3 text-[#0F766E] transition duration-200 hover:text-[#115E59]"
                    id="togglePasswordBtn">

                    <!-- Eye Open -->
                    <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-opacity duration-200"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5
            c4.477 0 8.268 2.943 9.542 7
            -1.274 4.057-5.065 7-9.542 7
            -4.477 0-8.268-2.943-9.542-7z" />
                    </svg>

                    <!-- Eye Closed -->
                    <svg id="eyeClose" xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 hidden transition-opacity duration-200" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18" />
                    </svg>

                </button>
            </div>

            <!-- Strength -->
            <div class="bg-gray-200 rounded-full mb-4">
                <div id="strengthBar" class="strength-bar bg-red-500 w-0"></div>
            </div>

            <!-- Confirm -->
            <div class="relative mb-2">
                <input type="password" name="password2" id="confirmPassword" class="input pr-20"
                    placeholder="Confirm password" autocomplete="new-password" required>

                <!-- Green Tick -->
                <span id="matchTick" class="absolute right-12 top-3 text-green-600 hidden text-lg">
                    ✓
                </span>

                <!-- Eye Button -->
                <button type="button"
                    class="absolute right-4 top-3 text-[#0F766E] transition duration-200 hover:text-[#115E59]"
                    id="toggleConfirmBtn">

                    <!-- Eye Open -->
                    <svg id="eyeOpen2" xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 transition-opacity duration-200" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5
                c4.477 0 8.268 2.943 9.542 7
                -1.274 4.057-5.065 7-9.542 7
                -4.477 0-8.268-2.943-9.542-7z" />
                    </svg>

                    <!-- Eye Closed -->
                    <svg id="eyeClose2" xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 hidden transition-opacity duration-200" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18" />
                    </svg>

                </button>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-[#0F766E] hover:bg-[#115E59]
                   text-white py-3 rounded-xl font-semibold">
                Reset Password →
            </button>
        </form>
    </div>

    <!-- Loader -->
    <div id="loader" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">
        <div class="bg-white p-6 rounded-xl text-center">
            <div class="w-12 h-12 border-4 border-gray-200 border-t-[#0F766E]
                    rounded-full animate-spin mx-auto mb-3"></div>
            Updating password securely...
        </div>
    </div>

    <script>
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");
        const strengthBar = document.getElementById("strengthBar");
        const form = document.getElementById("resetForm");
        const loader = document.getElementById("loader");

        password.addEventListener("input", () => {
            const val = password.value;
            let score = 0;

            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[a-z]/.test(val)) score++;
            if (/\d/.test(val)) score++;
            if (/[!@#$%^&*]/.test(val)) score++;

            strengthBar.style.width = (score * 20) + "%";

            if (score <= 2) strengthBar.className = "strength-bar bg-red-500";
            else if (score <= 4) strengthBar.className = "strength-bar bg-orange-500";
            else strengthBar.className = "strength-bar bg-green-600";
        });

        form.addEventListener("submit", function (e) {

            // Trim values for safety
            const pass1 = password.value.trim();
            const pass2 = confirmPassword.value.trim();

            // Block if empty (extra safety)
            if (pass1 === "" || pass2 === "") {
                e.preventDefault();
                return;
            }

            // Block if mismatch
            if (pass1 !== pass2) {
                e.preventDefault();

                confirmPassword.style.borderColor = "#DC2626";
                matchTick.classList.add("hidden");

                return false;   // important
            }

            // Only show loader if valid
            loader.classList.remove("hidden");
        });

        function enableHoldReveal(inputId, openId, closeId, btnId) {

            const input = document.getElementById(inputId);
            const eyeOpen = document.getElementById(openId);
            const eyeClose = document.getElementById(closeId);
            const button = document.getElementById(btnId);

            function showPassword() {
                input.type = "text";
                eyeOpen.classList.add("hidden");
                eyeClose.classList.remove("hidden");
            }

            function hidePassword() {
                input.type = "password";
                eyeOpen.classList.remove("hidden");
                eyeClose.classList.add("hidden");
            }

            // Desktop
            button.addEventListener("mousedown", showPassword);
            button.addEventListener("mouseup", hidePassword);
            button.addEventListener("mouseleave", hidePassword);

            // Mobile
            button.addEventListener("touchstart", showPassword);
            button.addEventListener("touchend", hidePassword);
        }

        enableHoldReveal("password", "eyeOpen", "eyeClose", "togglePasswordBtn");

        const matchTick = document.getElementById("matchTick");

        function checkPasswordMatch() {

            if (confirmPassword.value === "") {
                matchTick.classList.add("hidden");
                confirmPassword.style.borderColor = "#E5E7EB";
                return;
            }

            if (confirmPassword.value === password.value) {
                confirmPassword.style.borderColor = "#16A34A";
                matchTick.classList.remove("hidden");
            } else {
                confirmPassword.style.borderColor = "#DC2626";
                matchTick.classList.add("hidden");
            }
        }

        password.addEventListener("input", checkPasswordMatch);
        confirmPassword.addEventListener("input", checkPasswordMatch);
        enableHoldReveal("confirmPassword", "eyeOpen2", "eyeClose2", "toggleConfirmBtn");

        // Countdown Timer
        let remaining = parseInt("{{ remaining_time|default:'0' }}");

        const timerEl = document.getElementById("timer");
        const formEl = document.getElementById("resetForm");

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function updateTimer() {
            if (remaining <= 0) {
                timerEl.innerHTML = "Expired";
                timerEl.classList.remove("text-red-600");
                timerEl.classList.add("text-gray-500");

                if (formEl) {
                    formEl.style.display = "none";
                }

                setTimeout(() => {
                    window.location.href = "{% url 'users:patient_login' %}";
                }, 3000);

                return;
            }

            timerEl.innerHTML = formatTime(remaining);
            remaining--;
        }

        updateTimer();
        setInterval(updateTimer, 1000);
    </script>

</body>

</html>
