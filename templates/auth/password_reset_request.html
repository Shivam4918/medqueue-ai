{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Reset Password | MedQueue AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen bg-[#F9FAFB] flex items-center justify-center">

    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

        <h2 class="text-2xl font-bold text-center text-[#1E3A8A] mb-6">
            Reset Password
        </h2>

        <form method="POST" id="resetForm">
            {% csrf_token %}

            <input type="email" id="email" name="email" class="w-full border rounded-xl px-4 py-3 mb-2"
                placeholder="Enter your registered email" required>

            <p id="emailMsg" class="text-xs text-red-600 mb-3 hidden"></p>

            <button type="submit" id="submitBtn" class="w-full bg-[#0F766E] text-white py-3 rounded-xl font-semibold">
                Send Reset Link →
            </button>
        </form>
    </div>

    <!-- Loader -->
    <div id="loader" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">
        <div class="bg-white p-6 rounded-xl text-center">
            <div class="w-12 h-12 border-4 border-gray-200 border-t-[#0F766E] rounded-full animate-spin mx-auto mb-3">
            </div>
            Sending secure reset link...
        </div>
    </div>

    <script>
        const emailInput = document.getElementById("email");
        const msg = document.getElementById("emailMsg");
        const form = document.getElementById("resetForm");
        const loader = document.getElementById("loader");

        emailInput.addEventListener("blur", () => {
            const email = emailInput.value.trim();
            const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!pattern.test(email)) {
                msg.innerText = "Enter a valid email address.";
                msg.classList.remove("hidden");
            } else {
                msg.classList.add("hidden");
            }
        });

        form.addEventListener("submit", () => {
            loader.classList.remove("hidden");
        });
    </script>

</body>

</html>
