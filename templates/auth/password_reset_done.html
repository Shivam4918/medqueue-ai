<!DOCTYPE html>
<html>

<head>
    <title>Email Sent | MedQueue AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex items-center justify-center bg-[#F9FAFB]">

    <div class="bg-white p-10 rounded-2xl shadow-2xl text-center max-w-md">

        <div class="text-green-600 text-5xl mb-4">✓</div>

        <h2 class="text-2xl font-bold text-[#1E3A8A] mb-3">
            Reset Link Sent
        </h2>

        <p class="text-gray-600 mb-4">
            If your email is registered, a secure reset link has been sent.
        </p>

        {% if remaining_time > 0 %}
        <p class="text-sm text-gray-500">
            You can request again in <span id="timer">{{ remaining_time }}</span>s
        </p>
        {% else %}
        <a href="{% url 'users:password_reset' %}" class="text-[#0F766E] font-semibold">
            Resend Reset Link
        </a>
        {% endif %}

        <div class="mt-6">
            <a href="{% url 'users:patient_login' %}" class="text-sm text-[#1E3A8A] underline">
                Back to Login
            </a>
        </div>

    </div>

    <script>
        let time = parseInt("{{ remaining_time|default:'0' }}") || 0;
        const timerEl = document.getElementById("timer");

        if (timerEl && time > 0) {
            const interval = setInterval(() => {
                time--;
                timerEl.innerText = time;

                if (time <= 0) {
                    clearInterval(interval);
                    location.reload();
                }
            }, 1000);
        }
    </script>

</body>

</html>
