<!DOCTYPE html>
<html>

<head>
    <title>Password Updated</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex items-center justify-center bg-[#F9FAFB]">

    <div class="bg-white p-10 rounded-2xl shadow-2xl text-center">

        <div class="text-green-600 text-6xl mb-4 animate-bounce">✓</div>

        <h2 class="text-2xl font-bold text-[#1E3A8A] mb-3">
            Password Reset Successful
        </h2>

        <p class="text-gray-600 mb-5">
            You can now login with your new password.
        </p>

        <a href="{% url 'users:patient_login' %}" class="bg-[#0F766E] text-white px-6 py-3 rounded-xl">
            Go to Login →
        </a>

    </div>

</body>

</html>
