{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Verify Email | MedQueue AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .otp-box {
            width: 55px;
            height: 60px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            border-radius: 14px;
            border: 2px solid #E5E7EB;
            outline: none;
            transition: all 0.2s ease;
        }

        .otp-box:focus {
            border-color: #0F766E;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
            transform: translateY(-3px);
        }

        .otp-box.filled {
            border-color: #16A34A;
        }

        .shake {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            50% {
                transform: translateX(6px);
            }

            75% {
                transform: translateX(-6px);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-teal-50">

    <div id="otpCard" class="bg-white shadow-2xl rounded-2xl p-10 w-full max-w-md transition-all duration-300
     {% if messages %}shake{% endif %}">

        <h2 class="text-2xl font-bold text-center text-[#1E3A8A] mb-4">
            Verify Your Email
        </h2>

        <p class="text-sm text-gray-600 text-center mb-6">
            Enter the 6-digit OTP sent to your email.
        </p>

        {% if messages %}
        {% for message in messages %}
        {% if message.tags == "error" %}
        <div class="mb-4 p-3 rounded-lg bg-red-100 text-red-700 text-sm text-center">
            {{ message }}
        </div>
        {% endif %}
        {% endfor %}
        {% endif %}

        <form method="POST" id="otpForm">
            {% csrf_token %}

            <!-- OTP Boxes -->
            <div class="flex justify-center gap-3 mb-6">
                <input type="text" maxlength="1" class="otp-box" />
                <input type="text" maxlength="1" class="otp-box" />
                <input type="text" maxlength="1" class="otp-box" />
                <input type="text" maxlength="1" class="otp-box" />
                <input type="text" maxlength="1" class="otp-box" />
                <input type="text" maxlength="1" class="otp-box" />
            </div>

            <!-- Hidden Combined OTP -->
            <input type="hidden" name="otp" id="combinedOtp" />

            <button type="submit"
                class="w-full bg-[#0F766E] hover:bg-[#115E59] text-white py-3 rounded-xl font-semibold transition shadow-md">
                Verify OTP
            </button>
            <div class="text-center mt-4">
                <button type="button" id="resendBtn"
                    class="text-sm text-[#0F766E] font-semibold hover:underline disabled:text-gray-400" disabled>
                    Resend OTP (120s)
                </button>
            </div>

        </form>

    </div>

    <script>
        const otpInputs = document.querySelectorAll(".otp-box");
        const combinedOtp = document.getElementById("combinedOtp");
        const form = document.getElementById("otpForm");
        const otpCard = document.getElementById("otpCard");

        otpInputs.forEach((input, index) => {

            // Allow only numbers
            input.addEventListener("input", () => {
                input.value = input.value.replace(/[^0-9]/g, '');

                if (input.value) {
                    input.classList.add("filled");

                    if (index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                }

                updateOtpValue();
            });

            // Backspace support
            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && !input.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            // Paste full OTP
            input.addEventListener("paste", (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData("text").slice(0, 6);

                pastedData.split('').forEach((char, i) => {
                    if (otpInputs[i]) {
                        otpInputs[i].value = char;
                        otpInputs[i].classList.add("filled");
                    }
                });

                updateOtpValue();
            });
        });

        function updateOtpValue() {
            let otp = "";
            otpInputs.forEach(input => otp += input.value);
            combinedOtp.value = otp;

            // Auto submit when 6 digits
            if (otp.length === 6) {
                form.submit();
            }
        }

        let countdown = parseInt("{{ remaining_time|default:120 }}");
        let timerInterval = null;

        const resendBtn = document.getElementById("resendBtn");

        function startCountdown() {

            if (countdown <= 0) {
                resendBtn.innerText = "Resend OTP";
                resendBtn.disabled = false;
                return;
            }

            resendBtn.disabled = true;

            timerInterval = setInterval(() => {

                countdown--;

                resendBtn.innerText = `Resend OTP (${countdown}s)`;

                if (countdown <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.innerText = "Resend OTP";
                    resendBtn.disabled = false;
                }

            }, 1000);
        }

        startCountdown();

        resendBtn.addEventListener("click", async function () {

            resendBtn.disabled = true;
            resendBtn.innerText = "Sending...";

            try {

                const response = await fetch("{% url 'users:resend_otp' %}");

                if (!response.ok) {
                    throw new Error("Failed");
                }

                // Reset timer
                countdown = 120;
                startCountdown();

            } catch (error) {

                resendBtn.innerText = "Try Again";
                resendBtn.disabled = false;
            }
        });

    </script>

</body>

</html>
