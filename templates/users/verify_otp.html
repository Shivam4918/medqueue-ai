{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Verify Email | MedQueue AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-teal-50">

    <div class="bg-white shadow-2xl rounded-2xl p-10 w-full max-w-md">

        <h2 class="text-2xl font-bold text-center text-[#1E3A8A] mb-4">
            Verify Your Email
        </h2>

        <p class="text-sm text-gray-600 text-center mb-6">
            Enter the 6-digit OTP sent to your email.
        </p>

        {% if messages %}
        {% for message in messages %}
        {% if message.tags == "error" %}
        <div class="mb-4 p-3 rounded-lg bg-red-100 text-red-700 text-sm text-center">
            {{ message }}
        </div>
        {% endif %}
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="otp" maxlength="6"
                class="w-full px-4 py-3 border rounded-lg text-center text-xl tracking-widest focus:outline-none focus:ring-2 focus:ring-[#0F766E]"
                placeholder="------" required>

            <button type="submit"
                class="w-full mt-6 bg-[#0F766E] hover:bg-[#115E59] text-white py-3 rounded-xl font-semibold transition shadow-md">
                Verify OTP
            </button>
        </form>

    </div>

</body>

</html>
