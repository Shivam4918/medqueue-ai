<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Admin Dashboard{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">

    <div class="flex h-screen overflow-hidden">

        <!-- ================= SIDEBAR ================= -->
        <aside class="w-64 bg-black text-white flex flex-col">

            <!-- Logo -->
            <div class="h-16 flex items-center px-6 text-xl font-bold border-b border-gray-800">
                MedQueue AI
            </div>

            <!-- Menu -->
            <nav class="flex-1 p-4 space-y-2">

                <a href="/admin/dashboard/" class="block px-4 py-3 rounded-lg hover:bg-white/10
               {% if request.path == '/admin/dashboard/' %}bg-white/20{% endif %}">
                    Dashboard
                </a>

                <a href="/hospitals/create/" class="block px-4 py-3 rounded-lg hover:bg-white/10">
                    Add Hospital
                </a>

                <a href="#" class="block px-4 py-3 rounded-lg hover:bg-white/10">
                    Hospitals
                </a>

                <a href="#" class="block px-4 py-3 rounded-lg hover:bg-white/10">
                    Users
                </a>

                <a href="#" class="block px-4 py-3 rounded-lg hover:bg-white/10">
                    System Logs
                </a>

            </nav>

            <!-- Footer -->
            <div class="p-4 border-t border-gray-800">
                <a href="/logout/" class="text-sm text-gray-300 hover:text-white">
                    Logout
                </a>
            </div>

        </aside>


        <!-- ================= MAIN ================= -->
        <div class="flex-1 flex flex-col overflow-hidden">

            <!-- ================= TOPBAR ================= -->
            <header class="h-16 bg-white border-b flex items-center justify-between px-6">

                <h1 class="text-lg font-semibold">
                    {% block page_title %}Dashboard{% endblock %}
                </h1>

                <div class="flex items-center gap-4">

                    <!-- Notification -->
                    <div class="relative">
                        <button class="text-lg">🔔</button>
                        <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-1 rounded-full">
                            3
                        </span>
                    </div>

                    <!-- User -->
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-gray-300 rounded-full"></div>
                        <span class="text-sm font-medium">
                            {{ request.user.username }}
                        </span>
                    </div>

                </div>

            </header>


            <!-- ================= CONTENT ================= -->
            <main class="flex-1 overflow-y-auto p-6">

                {% block content %}
                {% endblock %}

            </main>

        </div>

    </div>

</body>

</html>
