<!-- templates/receptionist/walkin.html -->

{% extends "receptionist/base.html" %}

{% block content %}

<div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow">

    <h2 class="text-xl font-semibold mb-6">Create Walk-in Patient & Token</h2>

    <form id="tokenForm" class="space-y-5">

        <!-- Name -->
        <input type="text" id="name" placeholder="Full Name" class="w-full border p-3 rounded-lg" required>

        <!-- Mobile -->
        <input type="text" id="mobile" placeholder="Mobile Number" class="w-full border p-3 rounded-lg" required>

        <!-- Email -->
        <input type="email" id="email" placeholder="Email" class="w-full border p-3 rounded-lg">

        <!-- Doctor -->
        <select id="doctor" class="w-full border p-3 rounded-lg">
            {% for doc in doctors %}
            <option value="{{ doc.id }}">{{ doc.name }}</option>
            {% endfor %}
        </select>

        <!-- Button -->
        <button class="w-full bg-[#1E3A8A] text-white p-3 rounded-lg">
            Generate Token
        </button>

    </form>

    <!-- RESULT BOX -->
    <div id="result" class="mt-6 hidden bg-green-50 border border-green-200 p-5 rounded-xl">

        <p class="text-sm text-green-700">Token Generated Successfully</p>

        <p id="tokenNumber" class="text-3xl font-bold text-green-800 mt-2"></p>

        <div class="mt-4 text-sm text-gray-700">
            <p><b>Login Username:</b> <span id="username"></span></p>
            <p><b>Password:</b> Patient@123</p>
        </div>

    </div>

</div>

<script>

    document.getElementById("tokenForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const name = document.getElementById("name").value;
        const mobile = document.getElementById("mobile").value;
        const email = document.getElementById("email").value;
        const doctor = document.getElementById("doctor").value;

        try {

            const res = await fetch("/api/token_queue/walkin/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({
                    name: name,
                    mobile: mobile,
                    email: email,
                    doctor_id: doctor
                })
            });

            const data = await res.json();

            console.log("API RESPONSE:", data);

            if (!res.ok) {
                alert(data.detail || JSON.stringify(data));
                return;
            }

            document.getElementById("result").classList.remove("hidden");

            document.getElementById("tokenNumber").innerText =
                data.token_number;

            document.getElementById("username").innerText =
                data.username;

        } catch (error) {
            console.error(error);
            alert("Something went wrong");
        }

    });

</script>

{% endblock %}
