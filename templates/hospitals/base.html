{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hospital Admin | MedQueue AI</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #F9FAFB;
        }
    </style>

</head>

<body class="flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-[#1E3A8A] min-h-screen text-white p-6">

        <h2 class="text-2xl font-bold mb-10">MedQueue AI</h2>

        <nav class="space-y-3">

            <a href="/hospitals/dashboard/" class="block px-4 py-3 hover:bg-white/10 rounded-lg">
                Hospital Dashboard
            </a>

            <a href="/hospitals/doctors/" class="block px-4 py-3 hover:bg-white/10 rounded-lg">
                Doctors
            </a>

            <a href="#" class="block px-4 py-3 hover:bg-white/10 rounded-lg">
                Queue Monitor
            </a>

            <a href="/hospitals/staff/" class="block px-4 py-3 hover:bg-white/10 rounded-lg">
                Receptionists
            </a>

            <a href="#" class="block px-4 py-3 hover:bg-white/10 rounded-lg">
                Analytics
            </a>

            <button onclick="openLogoutModal()" class="w-full text-left px-4 py-3 hover:bg-white/10 rounded-lg">
                Logout
            </button>

        </nav>

    </aside>


    <!-- MAIN -->
    <div class="flex-1">

        <header class="flex justify-between items-center bg-white p-6 border-b">

            <h1 class="text-xl font-semibold">
                {% block page_title %}{% endblock %}
            </h1>

            <div class="flex items-center gap-3">

                <div class="w-8 h-8 bg-[#1E3A8A] text-white flex items-center justify-center rounded-full">
                    {{ request.user.username|first|upper }}
                </div>

                <div>
                    <p class="text-sm font-semibold">{{ request.user.username }}</p>
                    <p class="text-xs text-gray-500">Hospital Admin</p>
                </div>

            </div>

        </header>


        <div class="p-8">

            {% block content %}

            {% endblock %}

        </div>

    </div>


    <script>

        function openLogoutModal() {
            document.getElementById("logoutModal").classList.remove("hidden")
        }

        function closeLogoutModal() {
            document.getElementById("logoutModal").classList.add("hidden")
        }

    </script>

</body>

</html>
