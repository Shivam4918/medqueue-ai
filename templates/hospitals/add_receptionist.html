{% extends "hospitals/base.html" %}

{% block page_title %}
Add Receptionist
{% endblock %}

{% block content %}

<div class="max-w-xl">

    <h2 class="text-2xl font-semibold mb-6">
        Add Receptionist
    </h2>

    <form method="POST" class="space-y-4">

        {% csrf_token %}

        <input type="text" name="name" placeholder="Receptionist Name" class="w-full border p-3 rounded-lg">

        <input type="email" name="email" placeholder="Email" class="w-full border p-3 rounded-lg">

        <input type="password" name="password" placeholder="Password" class="w-full border p-3 rounded-lg">

        <button class="bg-[#1E3A8A] text-white px-6 py-3 rounded-lg">
            Create Receptionist
        </button>

    </form>

</div>

{% endblock %}
