<!DOCTYPE html>
<html>

<head>
    <title>Create Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

        <h2 class="text-2xl font-bold mb-6">Create Hospital</h2>

        <form method="POST">
            {% csrf_token %}

            <h3 class="font-semibold mb-3">Hospital Details</h3>

            <input name="hospital_name" placeholder="Hospital Name" class="w-full border p-3 mb-3 rounded">

            <input name="city" placeholder="City" class="w-full border p-3 mb-3 rounded">

            <input name="contact_phone" placeholder="Contact Phone" class="w-full border p-3 mb-3 rounded">

            <textarea name="address" placeholder="Address" class="w-full border p-3 mb-6 rounded"></textarea>


            <h3 class="font-semibold mb-3">Hospital Admin</h3>

            <input name="admin_name" placeholder="Admin Name" class="w-full border p-3 mb-3 rounded">

            <input name="admin_email" placeholder="Admin Email" class="w-full border p-3 mb-3 rounded">

            <input name="admin_password" placeholder="Password" class="w-full border p-3 mb-6 rounded">


            <button class="bg-blue-600 text-white px-6 py-3 rounded-lg">
                Create Hospital
            </button>

        </form>

    </div>

</body>

</html>
